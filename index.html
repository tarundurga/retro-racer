<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TURBO DRIFT — Retro Racer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    touch-action: none;
  }

  #gameWrapper {
    position: relative;
    width: min(100vw, 420px);
    height: 100dvh;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .score-box {
    background: rgba(0,0,0,0.7);
    border: 2px solid #ff2d55;
    padding: 6px 10px;
    color: #fff;
    font-size: 9px;
    line-height: 1.8;
    text-shadow: 0 0 8px #ff2d55;
  }

  .score-box span {
    color: #ffcc00;
    text-shadow: 0 0 8px #ffcc00;
  }

  #lives {
    font-size: 14px;
    color: #ff2d55;
    text-shadow: 0 0 10px #ff2d55;
    letter-spacing: 3px;
  }

  /* Controls */
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    display: flex;
    z-index: 10;
    pointer-events: all;
  }

  .ctrl-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(255,255,255,0.25);
    border-top: 2px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.3);
    pointer-events: all;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.1s, color 0.1s;
  }

  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(255,45,85,0.25);
    color: rgba(255,255,255,0.8);
    border-top-color: #ff2d55;
  }

  #ctrl-left { border-right: 1px solid rgba(255,255,255,0.05); }
  #ctrl-right { border-left: 1px solid rgba(255,255,255,0.05); }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 20;
    padding: 24px;
  }

  .overlay h1 {
    font-size: clamp(18px, 5vw, 28px);
    color: #ff2d55;
    text-shadow: 0 0 20px #ff2d55, 0 0 40px #ff2d55;
    text-align: center;
    animation: pulse 1s ease-in-out infinite alternate;
  }

  .overlay h2 {
    font-size: clamp(10px, 3vw, 14px);
    color: #ffcc00;
    text-align: center;
    text-shadow: 0 0 10px #ffcc00;
  }

  .overlay p {
    font-size: clamp(7px, 2vw, 10px);
    color: #aaa;
    text-align: center;
    line-height: 2;
  }

  .btn {
    background: #ff2d55;
    color: #fff;
    border: none;
    padding: 14px 32px;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(9px, 2.5vw, 12px);
    cursor: pointer;
    box-shadow: 0 0 20px #ff2d55, 4px 4px 0 #8b0000;
    transition: transform 0.1s, box-shadow 0.1s;
    text-transform: uppercase;
  }

  .btn:active { transform: translate(2px, 2px); box-shadow: 0 0 10px #ff2d55, 2px 2px 0 #8b0000; }

  #tiltHint {
    font-size: 8px;
    color: #555;
    text-align: center;
  }

  @keyframes pulse {
    from { opacity: 0.8; text-shadow: 0 0 10px #ff2d55; }
    to   { opacity: 1;   text-shadow: 0 0 30px #ff2d55, 0 0 60px #ff2d55; }
  }

  .hidden { display: none !important; }

  #scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 30;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>

  <div id="ui">
    <div class="score-box">
      SCORE<br><span id="scoreDisplay">0</span><br><br>
      BEST<br><span id="hiDisplay">0</span>
    </div>
    <div style="text-align:right">
      <div class="score-box" style="margin-bottom:6px">
        LVL <span id="lvlDisplay">1</span>
      </div>
      <div id="lives">♥♥♥</div>
    </div>
  </div>

  <div id="controls">
    <div class="ctrl-btn" id="ctrl-left">◀</div>
    <div class="ctrl-btn" id="ctrl-right">▶</div>
  </div>

  <!-- Start Screen -->
  <div class="overlay" id="startScreen">
    <h1>TURBO<br>DRIFT</h1>
    <h2>RETRO RACER</h2>
    <p>DODGE TRAFFIC<br>SURVIVE AS LONG AS YOU CAN<br>SPEED INCREASES EVERY LEVEL</p>
    <button class="btn" id="startBtn">INSERT COIN</button>
    <div id="tiltHint" id="tiltHint">◀ TAP SIDES TO STEER ▶<br>OR TILT YOUR PHONE</div>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <h1>GAME<br>OVER</h1>
    <div class="score-box" style="text-align:center;font-size:9px;line-height:2.2">
      SCORE<br><span id="finalScore" style="color:#ffcc00;font-size:14px">0</span><br><br>
      BEST<br><span id="finalBest" style="color:#ff2d55;font-size:14px">0</span>
    </div>
    <button class="btn" id="restartBtn">TRY AGAIN</button>
  </div>

  <div id="scanlines"></div>
</div>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const wrapper = document.getElementById('gameWrapper');

  // ─── Resize ───────────────────────────────────────────────
  function resize() {
    canvas.width = wrapper.clientWidth;
    canvas.height = wrapper.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ─── State ────────────────────────────────────────────────
  let W, H, RW, RX; // road geometry
  let state = 'start'; // start | playing | dead
  let score, hiScore = 0, lives, level, speed, spawnTimer, spawnInterval;
  let player, enemies, roadLines, shake, shakeTimer;
  let leftHeld = false, rightHeld = false;
  let tiltX = 0;

  // ─── Colours ──────────────────────────────────────────────
  const PALETTE = {
    sky:     '#0a0a1a',
    road:    '#1a1a2e',
    roadEdge:'#2a2a4e',
    line:    '#ffcc00',
    kerb1:   '#ff2d55',
    kerb2:   '#ffffff',
    player:  ['#00f0ff','#0090cc','#ffffff','#ffcc00'],
    cars: [
      ['#ff2d55','#cc0033','#ffffff'],
      ['#ffcc00','#cc9900','#ffffff'],
      ['#00ff88','#00aa55','#ffffff'],
      ['#ff6600','#cc4400','#ffffff'],
      ['#cc44ff','#8800cc','#ffffff'],
    ]
  };

  // ─── Road Lines ───────────────────────────────────────────
  function initRoad() {
    W = canvas.width; H = canvas.height;
    RW = W * 0.72;
    RX = (W - RW) / 2;
    roadLines = [];
    const count = 12;
    for (let i = 0; i < count; i++) {
      roadLines.push({ y: (H / count) * i });
    }
  }

  // ─── Player ───────────────────────────────────────────────
  function createPlayer() {
    const cw = RW * 0.18, ch = cw * 1.8;
    return {
      x: W / 2,
      y: H - ch * 2,
      w: cw, h: ch,
      vx: 0,
      invincible: 0,
    };
  }

  // ─── Enemy ────────────────────────────────────────────────
  function spawnEnemy() {
    const cw = RW * 0.17, ch = cw * 1.8;
    const lanes = 4;
    const laneW = (RW - cw) / lanes;
    const lane = Math.floor(Math.random() * lanes);
    const x = RX + cw * 0.5 + lane * laneW + laneW * 0.5;
    const colorSet = PALETTE.cars[Math.floor(Math.random() * PALETTE.cars.length)];
    enemies.push({ x, y: -ch, w: cw, h: ch, colors: colorSet, wobble: 0 });
  }

  // ─── Init / Reset ─────────────────────────────────────────
  function init() {
    initRoad();
    score = 0; lives = 3; level = 1; speed = 3;
    spawnTimer = 0; spawnInterval = 100;
    player = createPlayer();
    enemies = [];
    shake = { x: 0, y: 0 }; shakeTimer = 0;
    updateHUD();
  }

  // ─── HUD ──────────────────────────────────────────────────
  function updateHUD() {
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('hiDisplay').textContent = hiScore;
    document.getElementById('lvlDisplay').textContent = level;
    const hearts = '♥'.repeat(lives) + '♡'.repeat(Math.max(0, 3 - lives));
    document.getElementById('lives').textContent = hearts;
  }

  // ─── Draw pixel car ───────────────────────────────────────
  function drawCar(x, y, w, h, colors, flip) {
    const bx = x - w/2, by = y - h/2;
    // Body
    ctx.fillStyle = colors[0];
    ctx.fillRect(bx + w*0.1, by, w*0.8, h);
    // Roof
    ctx.fillStyle = colors[2];
    ctx.fillRect(bx + w*0.2, by + h*0.2, w*0.6, h*0.35);
    // Wheels
    ctx.fillStyle = '#111';
    const wy = flip ? h*0.1 : h*0.65;
    ctx.fillRect(bx, by + wy, w*0.18, h*0.22);
    ctx.fillRect(bx + w*0.82, by + wy, w*0.18, h*0.22);
    const wy2 = flip ? h*0.7 : h*0.1;
    ctx.fillRect(bx, by + wy2, w*0.18, h*0.22);
    ctx.fillRect(bx + w*0.82, by + wy2, w*0.18, h*0.22);
    // Headlights
    ctx.fillStyle = colors[3] || '#ffff88';
    const ly = flip ? h*0.82 : by;
    const headY = flip ? by + h*0.82 : by + h*0.04;
    ctx.fillRect(bx + w*0.15, headY, w*0.2, h*0.08);
    ctx.fillRect(bx + w*0.65, headY, w*0.2, h*0.08);
    // Stripe
    ctx.fillStyle = colors[1];
    ctx.fillRect(bx + w*0.35, by + h*0.45, w*0.3, h*0.08);
  }

  // ─── Draw Road ────────────────────────────────────────────
  function drawRoad() {
    // Sky / background
    ctx.fillStyle = PALETTE.sky;
    ctx.fillRect(0, 0, W, H);

    // Road surface
    ctx.fillStyle = PALETTE.road;
    ctx.fillRect(RX, 0, RW, H);

    // Kerb stripes
    const ks = 40;
    for (let y = 0; y < H; y += ks * 2) {
      const off = (Date.now() / 20) % (ks * 2);
      ctx.fillStyle = PALETTE.kerb1;
      ctx.fillRect(RX - 14, y - off, 14, ks);
      ctx.fillRect(RX + RW, y - off, 14, ks);
      ctx.fillStyle = PALETTE.kerb2;
      ctx.fillRect(RX - 14, y - off + ks, 14, ks);
      ctx.fillRect(RX + RW, y - off + ks, 14, ks);
    }

    // Road edges
    ctx.fillStyle = PALETTE.roadEdge;
    ctx.fillRect(RX - 2, 0, 2, H);
    ctx.fillRect(RX + RW, 0, 2, H);

    // Centre dashes
    ctx.fillStyle = PALETTE.line;
    const dashH = 40, dashGap = 50;
    const offset = (Date.now() / 8 * (speed / 5)) % (dashH + dashGap);
    const lanes = 3;
    for (let l = 1; l < lanes + 1; l++) {
      const lx = RX + (RW / (lanes + 1)) * l;
      for (let y = -dashH + offset; y < H + dashH; y += dashH + dashGap) {
        ctx.fillRect(lx - 2, y, 4, dashH);
      }
    }
  }

  // ─── Collision ────────────────────────────────────────────
  function rectsOverlap(a, b) {
    return Math.abs(a.x - b.x) < (a.w + b.w) * 0.38 &&
           Math.abs(a.y - b.y) < (a.h + b.h) * 0.38;
  }

  // ─── Haptic ───────────────────────────────────────────────
  function vibrate(pattern) {
    try { navigator.vibrate && navigator.vibrate(pattern); } catch(e) {}
  }

  // ─── Update ───────────────────────────────────────────────
  function update() {
    if (state !== 'playing') return;

    // Input
    const ACCEL = 0.9, MAX_VX = RW * 0.038;
    let inputX = leftHeld ? -1 : rightHeld ? 1 : 0;
    if (Math.abs(tiltX) > 4) inputX = Math.sign(tiltX) * Math.min(Math.abs(tiltX) / 20, 1);

    player.vx += inputX * ACCEL;
    player.vx *= 0.78;
    player.vx = Math.max(-MAX_VX, Math.min(MAX_VX, player.vx));
    player.x += player.vx;
    player.x = Math.max(RX + player.w/2, Math.min(RX + RW - player.w/2, player.x));

    // Road lines scroll
    roadLines.forEach(l => {
      l.y += speed;
      if (l.y > H) l.y -= H;
    });

    // Enemies
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnEnemy();
    }

    enemies.forEach(e => { e.y += speed * 0.55; });
    enemies = enemies.filter(e => e.y < H + e.h);

    // Collision
    if (player.invincible <= 0) {
      for (let e of enemies) {
        if (rectsOverlap(player, e)) {
          lives--;
          player.invincible = 120;
          shakeTimer = 20;
          vibrate([80, 40, 80, 40, 200]);
          updateHUD();
          if (lives <= 0) {
            state = 'dead';
            if (score > hiScore) hiScore = score;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalBest').textContent = hiScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            vibrate([200, 100, 200, 100, 500]);
            return;
          }
          break;
        }
      }
    } else {
      player.invincible--;
    }

    // Score & level
    score++;
    if (score % 500 === 0) {
      level++;
      speed = Math.min(10, speed + 0.8);
      spawnInterval = Math.max(50, spawnInterval - 6);
      vibrate([60, 30, 60]);
    }

    // Shake
    if (shakeTimer > 0) {
      shake.x = (Math.random() - 0.5) * 10;
      shake.y = (Math.random() - 0.5) * 10;
      shakeTimer--;
    } else {
      shake.x = 0; shake.y = 0;
    }

    updateHUD();
  }

  // ─── Draw ─────────────────────────────────────────────────
  function draw() {
    ctx.save();
    ctx.translate(shake.x, shake.y);

    drawRoad();

    // Enemies
    enemies.forEach(e => drawCar(e.x, e.y, e.w, e.h, e.colors, false));

    // Player (flicker when invincible - show most of the time, brief flashes off)
    if (state === 'playing' && (player.invincible <= 0 || Math.floor(player.invincible / 8) % 3 !== 0)) {
      drawCar(player.x, player.y, player.w, player.h, PALETTE.player, true);
    }

    // Speed lines
    if (speed > 9) {
      ctx.globalAlpha = (speed - 9) / 20;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        const lx = RX + Math.random() * RW;
        const ly = Math.random() * H;
        const lh = 20 + Math.random() * 40;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(lx, ly + lh);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  // ─── Loop ─────────────────────────────────────────────────
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // ─── Controls ─────────────────────────────────────────────
  const btnL = document.getElementById('ctrl-left');
  const btnR = document.getElementById('ctrl-right');

  function setLeft(v) { leftHeld = v; v ? btnL.classList.add('pressed') : btnL.classList.remove('pressed'); }
  function setRight(v) { rightHeld = v; v ? btnR.classList.add('pressed') : btnR.classList.remove('pressed'); }

  btnL.addEventListener('touchstart', e => { e.preventDefault(); setLeft(true); }, {passive:false});
  btnL.addEventListener('touchend',   e => { e.preventDefault(); setLeft(false); }, {passive:false});
  btnR.addEventListener('touchstart', e => { e.preventDefault(); setRight(true); }, {passive:false});
  btnR.addEventListener('touchend',   e => { e.preventDefault(); setRight(false); }, {passive:false});

  // Keyboard
  document.addEventListener('keydown', e => { if(e.key==='ArrowLeft'||e.key==='a') setLeft(true); if(e.key==='ArrowRight'||e.key==='d') setRight(true); });
  document.addEventListener('keyup',   e => { if(e.key==='ArrowLeft'||e.key==='a') setLeft(false); if(e.key==='ArrowRight'||e.key==='d') setRight(false); });

  // Tilt
  function enableTilt() {
    window.addEventListener('deviceorientation', e => {
      tiltX = e.gamma || 0;
    });
  }

  // ─── Buttons ──────────────────────────────────────────────
  document.getElementById('startBtn').addEventListener('click', () => {
    // Request tilt permission on iOS first (must be inside user gesture)
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(r => { if (r === 'granted') enableTilt(); })
        .catch(() => {});
    } else {
      enableTilt();
    }
    document.getElementById('startScreen').classList.add('hidden');
    init();
    state = 'playing';
  });

  document.getElementById('restartBtn').addEventListener('click', () => {
    document.getElementById('gameOverScreen').classList.add('hidden');
    init();
    state = 'playing';
  });

  // ─── Kick off ─────────────────────────────────────────────
  init();
  loop();
})();
</script>
</body>
</html>
