<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Retro Racer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: "Courier New", monospace;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #game-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    #canvas-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      color: #ffdd44;
      text-shadow: 0 0 4px #000, 0 0 8px #000;
      font-size: clamp(12px, 3vw, 18px);
      font-weight: bold;
    }
    #controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
      gap: 24px;
      pointer-events: none;
      z-index: 10;
    }
    #controls button {
      pointer-events: auto;
      width: 72px;
      height: 72px;
      border: 4px solid #ffdd44;
      border-radius: 12px;
      background: rgba(255, 100, 50, 0.4);
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      box-shadow: 0 4px 0 #aa3300, inset 0 0 20px rgba(255,200,100,0.2);
      transition: transform 0.05s, box-shadow 0.05s;
    }
    #controls button:active {
      transform: scale(0.92);
      box-shadow: 0 2px 0 #aa3300, inset 0 0 20px rgba(255,200,100,0.4);
    }
    #controls button.left { border-color: #44aaff; background: rgba(50, 100, 255, 0.4); box-shadow: 0 4px 0 #0044aa; }
    #controls button.left:active { box-shadow: 0 2px 0 #0044aa; }
    #controls button.right { border-color: #44aaff; background: rgba(50, 100, 255, 0.4); box-shadow: 0 4px 0 #0044aa; }
    #controls button.right:active { box-shadow: 0 2px 0 #0044aa; }
    .screen-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      color: #ffdd44;
      text-align: center;
      padding: 24px;
      pointer-events: auto;
    }
    .screen-overlay h1 {
      font-size: clamp(24px, 6vw, 42px);
      margin-bottom: 16px;
      text-shadow: 0 0 10px #ff6600;
    }
    .screen-overlay p {
      font-size: clamp(14px, 3.5vw, 20px);
      margin-bottom: 8px;
      color: #ccc;
    }
    .screen-overlay .tap-hint {
      margin-top: 24px;
      font-size: clamp(12px, 2.5vw, 16px);
      color: #888;
    }
    #gameOver .final-score { font-size: clamp(18px, 4vw, 28px); color: #ff8844; margin: 8px 0; }
    #gameOver .high-score { color: #44ff88; }
  </style>
</head>
<body>
  <div id="game-wrap">
    <div id="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
      <div id="hud">
        <span>SCORE: <span id="scoreEl">0</span></span>
        <span>HI: <span id="hiScoreEl">0</span></span>
        <span>LIVES: <span id="livesEl">3</span></span>
      </div>
      <div id="startScreen" class="screen-overlay">
        <h1>RETRO RACER</h1>
        <p>Dodge oncoming traffic!</p>
        <p>Tilt device or use &larr; &rarr; buttons</p>
        <p class="tap-hint">TAP TO START</p>
      </div>
      <div id="gameOver" class="screen-overlay" style="display: none;">
        <h1>GAME OVER</h1>
        <p class="final-score">Score: <span id="finalScore">0</span></p>
        <p class="high-score">Best: <span id="bestScore">0</span></p>
        <p class="tap-hint">TAP TO PLAY AGAIN</p>
      </div>
    </div>
    <div id="controls">
      <button type="button" class="left" id="btnLeft" aria-label="Steer left">&larr;</button>
      <button type="button" class="right" id="btnRight" aria-label="Steer right">&rarr;</button>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');

  var W = 320;
  var H = 480;
  var ROAD_W = 180;
  var ROAD_X = (W - ROAD_W) / 2;
  var LANE_W = ROAD_W / 3;
  var LANES = [
    ROAD_X + LANE_W * 0.5,
    ROAD_X + LANE_W * 1.5,
    ROAD_X + LANE_W * 2.5
  ];

  var COLORS = {
    sky: '#1a1a2e',
    grass: '#2d5a27',
    grassAlt: '#1e3d1a',
    road: '#2a2a2a',
    roadLine: '#f0e68c',
    roadLineDark: '#1a1a1a',
    player: '#e63946',
    playerDark: '#9d0208',
    playerLight: '#ff6b6b',
    enemy1: '#4cc9f0',
    enemy2: '#f72585',
    enemy3: '#06d6a0',
    enemy4: '#ffd166',
    enemy5: '#9b5de5',
    white: '#ffffff',
    black: '#0a0a0a'
  };

  var CAR_W = 28;
  var CAR_H = 48;
  var PLAYER_Y = H - 80;
  var ROAD_STRIPE_H = 24;
  var ROAD_STRIPE_GAP = 16;

  var state = {
    mode: 'start',
    score: 0,
    hiScore: parseInt(localStorage.getItem('retroRacerHi') || '0', 10),
    lives: 3,
    roadOffset: 0,
    speed: 4,
    baseSpeed: 4,
    maxSpeed: 12,
    spawnTimer: 0,
    spawnInterval: 90,
    minSpawnInterval: 28,
    tilt: 0,
    tiltEnabled: false,
    keys: { left: false, right: false },
    invincibleUntil: 0,
    flashUntil: 0
  };

  var player = { x: LANES[1], lane: 1, targetX: LANES[1] };
  var enemies = [];
  var particles = [];

  function resize() {
    var wrap = document.getElementById('canvas-wrap');
    var r = Math.min(wrap.clientWidth / W, wrap.clientHeight / H);
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = (W * r) + 'px';
    canvas.style.height = (H * r) + 'px';
  }

  function drawRoad() {
    var o = state.roadOffset;
    ctx.fillStyle = COLORS.sky;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = COLORS.grass;
    ctx.fillRect(0, 0, ROAD_X, H);
    ctx.fillRect(ROAD_X + ROAD_W, 0, W - ROAD_X - ROAD_W, H);
    var g = 0;
    for (var y = -ROAD_STRIPE_H; y < H + ROAD_STRIPE_H; y += 8) {
      ctx.fillStyle = g % 2 === 0 ? COLORS.grass : COLORS.grassAlt;
      ctx.fillRect(0, (y + o) % (H + 40) - 20, ROAD_X, 8);
      ctx.fillRect(ROAD_X + ROAD_W, (y + o) % (H + 40) - 20, W, 8);
      g++;
    }
    ctx.fillStyle = COLORS.road;
    ctx.fillRect(ROAD_X, 0, ROAD_W, H);
    ctx.fillStyle = COLORS.roadLineDark;
    ctx.fillRect(ROAD_X, 0, 4, H);
    ctx.fillRect(ROAD_X + ROAD_W - 4, 0, 4, H);
    ctx.fillStyle = COLORS.roadLine;
    for (var i = 0; i < 3; i++) {
      var lx = ROAD_X + LANE_W * i + LANE_W / 2 - 2;
      for (var yy = -ROAD_STRIPE_H - ROAD_STRIPE_GAP; yy < H + 40; yy += ROAD_STRIPE_H + ROAD_STRIPE_GAP) {
        var drawY = (yy + o) % (H + 60) - 30;
        ctx.fillRect(lx, drawY, 4, ROAD_STRIPE_H);
      }
    }
  }

  function drawCar(x, y, color, colorDark, colorLight, facingUp) {
    var w = CAR_W;
    var h = CAR_H;
    x = x - w / 2;
    y = y - h / 2;
    ctx.fillStyle = COLORS.black;
    ctx.fillRect(x + 2, y + 2, w, h);
    ctx.fillStyle = colorDark;
    ctx.fillRect(x + 4, y + 4, w - 8, h - 8);
    ctx.fillStyle = color;
    ctx.fillRect(x + 6, y + 6, w - 12, h - 12);
    if (facingUp) {
      ctx.fillStyle = colorLight;
      ctx.fillRect(x + 10, y + 8, w - 20, 10);
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(x + 8, y + h - 14, 6, 6);
      ctx.fillRect(x + w - 14, y + h - 14, 6, 6);
    } else {
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(x + 8, y + 8, 6, 6);
      ctx.fillRect(x + w - 14, y + 8, 6, 6);
      ctx.fillStyle = colorLight;
      ctx.fillRect(x + 10, y + h - 18, w - 20, 10);
    }
  }

  function drawPlayer() {
    if (state.flashUntil > 0) {
      if (Math.floor(state.flashUntil / 8) % 2 === 1) return;
    } else if (state.invincibleUntil > 0) {
      if (Math.floor(state.invincibleUntil / 10) % 2 === 1) return;
    }
    drawCar(player.x, PLAYER_Y, COLORS.player, COLORS.playerDark, COLORS.playerLight, true);
  }

  var ENEMY_COLORS = [
    [COLORS.enemy1, '#2a8fb8', '#88ddff'],
    [COLORS.enemy2, '#a01a50', '#ff6bab'],
    [COLORS.enemy3, '#038f5c', '#4dffc9'],
    [COLORS.enemy4, '#c99b2e', '#ffe099'],
    [COLORS.enemy5, '#5b2d8f', '#c9a0ff']
  ];

  function drawEnemies() {
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      var pal = ENEMY_COLORS[e.colorIndex % ENEMY_COLORS.length];
      drawCar(e.x, e.y, pal[0], pal[1], pal[2], false);
    }
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
      ctx.globalAlpha = 1;
    }
  }

  function drawHud() {
    document.getElementById('scoreEl').textContent = state.score;
    document.getElementById('hiScoreEl').textContent = state.hiScore;
    document.getElementById('livesEl').textContent = state.lives;
  }

  function addCrashParticles(px, py) {
    for (var i = 0; i < 16; i++) {
      particles.push({
        x: px,
        y: py,
        vx: (Math.random() - 0.5) * 14,
        vy: (Math.random() - 0.5) * 14 - 4,
        life: 30 + Math.floor(Math.random() * 20),
        maxLife: 50,
        color: ['#e63946', '#ffdd44', '#ffffff'][Math.floor(Math.random() * 3)]
      });
    }
  }

  function haptic() {
    if (navigator.vibrate) {
      navigator.vibrate([50, 30, 50]);
    }
  }

  function collides(a, b) {
    var dx = Math.abs(a.x - b.x);
    var dy = Math.abs(a.y - b.y);
    return dx < CAR_W * 0.7 && dy < CAR_H * 0.7;
  }

  function spawnEnemy() {
    var lane = Math.floor(Math.random() * 3);
    var x = LANES[lane];
    var colorIndex = Math.floor(Math.random() * ENEMY_COLORS.length);
    var enemySpeed = 1.2 + (state.speed - state.baseSpeed) / (state.maxSpeed - state.baseSpeed) * 1.8;
    enemySpeed = Math.min(enemySpeed, 3);
    enemies.push({
      x: x,
      y: -CAR_H,
      lane: lane,
      colorIndex: colorIndex,
      speed: enemySpeed + (Math.random() - 0.3) * 0.4
    });
  }

  function update(dt) {
    if (state.mode !== 'play') return;

    state.score += Math.floor(state.speed * 0.5);
    if (state.score > state.hiScore) {
      state.hiScore = state.score;
      localStorage.setItem('retroRacerHi', String(state.hiScore));
    }

    var difficulty = Math.min(state.score / 500, 8);
    state.speed = state.baseSpeed + difficulty * (state.maxSpeed - state.baseSpeed) / 8;
    state.speed = Math.min(state.speed, state.maxSpeed);
    state.spawnInterval = Math.max(state.minSpawnInterval, 90 - Math.floor(state.score / 80));

    state.roadOffset = (state.roadOffset + state.speed * 3) % (ROAD_STRIPE_H + ROAD_STRIPE_GAP);

    var move = 0;
    if (state.keys.left) move = -1;
    if (state.keys.right) move = 1;
    if (state.tiltEnabled && state.tilt !== 0) move = Math.max(-1, Math.min(1, state.tilt));
    if (move !== 0) {
      var targetLane = player.lane + move;
      if (targetLane >= 0 && targetLane <= 2) {
        player.lane = targetLane;
        player.targetX = LANES[player.lane];
      }
    }
    player.x += (player.targetX - player.x) * 0.15;
    if (Math.abs(player.targetX - player.x) < 1) player.x = player.targetX;

    state.spawnTimer++;
    if (state.spawnTimer >= state.spawnInterval) {
      state.spawnTimer = 0;
      spawnEnemy();
    }

    for (var i = enemies.length - 1; i >= 0; i--) {
      enemies[i].y += enemies[i].speed;
      if (enemies[i].y > H + CAR_H) enemies.splice(i, 1);
    }

    if (state.flashUntil > 0) {
      state.flashUntil -= 1;
      if (state.flashUntil <= 0) {
        if (state.lives <= 0) {
          state.mode = 'gameover';
          document.getElementById('gameOver').style.display = 'flex';
          document.getElementById('finalScore').textContent = state.score;
          document.getElementById('bestScore').textContent = state.hiScore;
        } else {
          state.invincibleUntil = 90;
        }
      }
      drawHud();
      return;
    }

    if (state.invincibleUntil > 0) state.invincibleUntil--;

    var playerBox = { x: player.x, y: PLAYER_Y };
    for (var j = 0; j < enemies.length; j++) {
      if (state.invincibleUntil <= 0 && collides(playerBox, enemies[j])) {
        state.lives--;
        haptic();
        addCrashParticles(player.x, PLAYER_Y);
        state.flashUntil = 45;
        enemies.splice(j, 1);
        break;
      }
    }

    for (var k = particles.length - 1; k >= 0; k--) {
      particles[k].x += particles[k].vx;
      particles[k].y += particles[k].vy;
      particles[k].vy += 0.4;
      particles[k].life--;
      if (particles[k].life <= 0) particles.splice(k, 1);
    }

    drawHud();
  }

  function draw() {
    drawRoad();
    drawEnemies();
    drawPlayer();
    drawParticles();
  }

  function loop(t) {
    loop.last = loop.last || t;
    var dt = Math.min((t - loop.last) / 16.67, 4);
    loop.last = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function startGame() {
    state.mode = 'play';
    state.score = 0;
    state.lives = 3;
    state.roadOffset = 0;
    state.speed = state.baseSpeed;
    state.spawnTimer = 0;
    state.invincibleUntil = 0;
    state.flashUntil = 0;
    player.lane = 1;
    player.x = LANES[1];
    player.targetX = LANES[1];
    enemies.length = 0;
    particles.length = 0;
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameOver').style.display = 'none';
    drawHud();
  }

  function onKeyDown(e) {
    if (e.key === 'ArrowLeft') { state.keys.left = true; e.preventDefault(); }
    if (e.key === 'ArrowRight') { state.keys.right = true; e.preventDefault(); }
    if (e.key === ' ' && state.mode === 'start') { e.preventDefault(); startGame(); }
  }

  function onKeyUp(e) {
    if (e.key === 'ArrowLeft') state.keys.left = false;
    if (e.key === 'ArrowRight') state.keys.right = false;
  }

  function setupTilt() {
    if (typeof DeviceOrientationEvent === 'undefined') return;
    var requestPermission = window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission === 'function';
    function handleOrientation(e) {
      if (e.gamma != null) {
        state.tiltEnabled = true;
        var gamma = Math.max(-45, Math.min(45, e.gamma));
        state.tilt = gamma / 45;
      } else if (e.beta != null) {
        state.tiltEnabled = true;
        var beta = Math.max(-90, Math.min(90, e.beta));
        state.tilt = Math.max(-1, Math.min(1, (beta - 45) / 45));
      }
    }
    window.addEventListener('deviceorientation', handleOrientation, true);
    window.addEventListener('deviceorientationabsolute', handleOrientation, true);
    if (requestPermission) {
      document.getElementById('startScreen').addEventListener('click', function requestTilt() {
        requestPermission().then(function (res) {
          if (res === 'granted') state.tiltEnabled = true;
        }).catch(function () {});
      }, { once: true });
    }
  }

  document.getElementById('startScreen').addEventListener('click', function () {
    if (state.mode === 'start') startGame();
  });
  document.getElementById('gameOver').addEventListener('click', function () {
    if (state.mode === 'gameover') startGame();
  });

  document.getElementById('btnLeft').addEventListener('touchstart', function (e) { e.preventDefault(); state.keys.left = true; }, { passive: false });
  document.getElementById('btnLeft').addEventListener('touchend', function (e) { e.preventDefault(); state.keys.left = false; }, { passive: false });
  document.getElementById('btnLeft').addEventListener('touchcancel', function (e) { e.preventDefault(); state.keys.left = false; }, { passive: false });
  document.getElementById('btnLeft').addEventListener('mousedown', function (e) { e.preventDefault(); state.keys.left = true; });
  document.getElementById('btnLeft').addEventListener('mouseup', function () { state.keys.left = false; });
  document.getElementById('btnLeft').addEventListener('mouseleave', function () { state.keys.left = false; });

  document.getElementById('btnRight').addEventListener('touchstart', function (e) { e.preventDefault(); state.keys.right = true; }, { passive: false });
  document.getElementById('btnRight').addEventListener('touchend', function (e) { e.preventDefault(); state.keys.right = false; }, { passive: false });
  document.getElementById('btnRight').addEventListener('touchcancel', function (e) { e.preventDefault(); state.keys.right = false; }, { passive: false });
  document.getElementById('btnRight').addEventListener('mousedown', function (e) { e.preventDefault(); state.keys.right = true; });
  document.getElementById('btnRight').addEventListener('mouseup', function () { state.keys.right = false; });
  document.getElementById('btnRight').addEventListener('mouseleave', function () { state.keys.right = false; });

  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup', onKeyUp);

  resize();
  window.addEventListener('resize', resize);
  setupTilt();
  drawRoad();
  drawHud();
  requestAnimationFrame(loop);
})();
  </script>
</body>
</html>
